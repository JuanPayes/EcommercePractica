name: Java CI with Maven

on:
  push:
    branches:
      - main
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ecommerce_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        working-directory: Ecommerse
        run: mvn clean install
        env:
          SPRING_PROFILES_ACTIVE: local
          DB_NAME: ecommerce_test
          DB_USER: postgres
          DB_PASS: postgres
          JWT_SECRET_KEY: dGVzdF9zZWNyZXRfa2V5X3BhcmFfY2lfc29sYW1lbnRl
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD_HASH: $$2a$$10$$N9qo8uLOickgx2ZMRZoMy.ZRfV0sample
          ADMIN_NOMBRE: Test Admin